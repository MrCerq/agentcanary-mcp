name: Publish to npm
on:
  push:
    tags: ['v*']
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Trusted Publishing (OIDC) requires npm 11.5.1+; pin it so a future
      # npm@latest engine bump cannot break tag publishes.
      - run: npm install -g npm@11.5.1
      - run: npm install
      - run: npm test
      # No NODE_AUTH_TOKEN — auth handled via OIDC trusted publisher
      # (configured on npmjs.com → agentcanary-mcp → Trusted publishers).
      - run: npm publish --provenance --access public
